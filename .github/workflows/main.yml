name: Main CI Flow

on:
  push:
    branches-ignore: []
  pull_request:
    branches-ignore: []

jobs:
  lint:
    name: Code Quality (Ruff)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: uv sync
      - name: Run Ruff Linter
        run: uv run ruff check .

  test:
    name: Unit Tests (Pytest)
    runs-on: ubuntu-latest
    needs: [lint] # This line makes it wait for lint to pass first!
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: ${{ secrets.DATABASE_NAME }}
          POSTGRES_USER: ${{ secrets.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: uv sync
      - name: Execute Pytest Suite
        run: uv run pytest

  performance:
    name: Load Test (k6)
    runs-on: ubuntu-latest
    needs: [test] # This line makes it wait for the unit tests to pass!
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      PORT: 5006
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: ${{ secrets.DATABASE_NAME }}
          POSTGRES_USER: ${{ secrets.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: uv sync
      - name: Start App background worker
        run: |
          uv run python setup_db.py
          uv run gunicorn --bind 0.0.0.0:5006 --workers 4 --threads 50 "app:create_app()" &
          timeout 30s bash -c "until curl -s http://localhost:5006/health; do sleep 1; done"
      - name: Install k6 (Direct Binary)
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v0.51.0/k6-v0.51.0-linux-amd64.tar.gz -o k6.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.51.0-linux-amd64/k6 /usr/local/bin/k6
      - name: Execute Load Test
        run: k6 run k6/load_test.js
