name: CI Tests

on:
  push:
    branches-ignore: []
  pull_request:
    branches-ignore: []

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      PORT: 5006

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: ${{ secrets.DATABASE_NAME }}
          POSTGRES_USER: ${{ secrets.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Install dependencies
        run: uv sync
        
      - name: Run Unit Tests (Pytest)
        run: uv run pytest
        
      - name: Start App for Load Testing
        run: |
          uv run gunicorn --bind 0.0.0.0:5006 "app:create_app()" &
          # Wait for app to be ready
          timeout 30s bash -c "until curl -s http://localhost:5006/health; do sleep 1; done"
          
      - name: Install k6 (Direct Binary)
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v0.51.0/k6-v0.51.0-linux-amd64.tar.gz -o k6.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.51.0-linux-amd64/k6 /usr/local/bin/k6
          
      - name: Run k6 Load Test
        run: k6 run k6/load_test.js --vus 10 --duration 5s
